<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>企业微信</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            /* 尝试解决色彩渲染偏差 */
            image-rendering: -webkit-optimize-contrast;
            color-profile: sRGB;
        }

        /* 公共图片样式：强制铺满，不留缝隙 */
        .full-screen-bg {
            position: fixed;
            left: 0;
            width: 100vw;
            height: 100vh; /* 强制高度为屏幕高度 */
            background-size: 100% 100%; /* 关键：强制拉伸铺满，解决覆盖不全 */
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 侧边栏层 */
        .sidebar-bg {
            background-image: url('sidebar.png');
            z-index: 1;
        }

        /* 首页层 */
        .main-container {
            background-image: url('home.png');
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-radius 0.4s;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            
            /* 【核心保留】强制把首页图片向上拉，藏住黑边 */
            transform: translateY(-5px); 
        }

        /* 侧边栏打开时的复合动画（水平推移 + 保持垂直位移 + 缩放 + 圆角） */
        .main-container.open {
            /* 85vw 是向右推移距离，-5px 是保持上面的垂直位移，0.94 是缩放比例 */
            transform: translateX(85vw) translateY(-5px) scale(0.94);
            border-radius: 12px;
        }

        /* 透明触发热区（加大加高，方便点击） */
        .menu-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 120px;
            z-index: 10;
        }

        .close-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 11;
        }
        .main-container.open .close-overlay {
            display: block;
        }

    </style>
</head>
<body>

    <div class="sidebar-bg full-screen-bg"></div>

    <div class="main-container full-screen-bg" id="app">
        <div class="menu-trigger" onclick="toggleMenu(event)"></div>
        <div class="close-overlay" onclick="toggleMenu(event)"></div>
    </div>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            const app = document.getElementById('app');
            app.classList.toggle('open');
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
